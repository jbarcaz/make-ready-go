<div class="page-container">
  <mat-card class="services-card">
    <div class="services-header">
      <p class="eyebrow">Our services</p>
      <h1 class="card-title">Turn support that helps your property look ready, faster.</h1>
      <p class="card-subtitle">
        Make Ready Go supports multifamily teams with practical services that keep
        turns moving and property presentation strong.
      </p>
    </div>

    <div class="service-grid">
      @for (service of services; track service.title) {
        <article class="service-card">
          <h2>{{ service.title }}</h2>
          <p>{{ service.description }}</p>
        </article>
      }
    </div>
  </mat-card>
</div>
